name: Deploy MkDocs to S3

on:
  pull_request_target:
    branches: [main]

env:
  S3_BUCKET: ${{ secrets.S3_BUCKET }}
  CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  authorization-check:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      approval-env: ${{ steps.collab-check.outputs.result }}
    steps:
      - name: Collaborator Check
        uses: actions/github-script@v8
        id: collab-check
        with:
          result-encoding: string
          script: |
            try {
              const permissionResponse = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: context.payload.pull_request.user.login,
              });
              const permission = permissionResponse.data.permission;
              const hasWriteAccess = ['write', 'admin'].includes(permission);
              
              if (!hasWriteAccess) {
                console.log(`User ${context.payload.pull_request.user.login} does not have write access to the repository (permission: ${permission})`);
                return "manual-approval"
              } else {
                console.log(`Verified ${context.payload.pull_request.user.login} has write access. Auto approving documentation deployment.`)
                return "auto-approve"
              }
            } catch (error) {
              console.log(`${context.payload.pull_request.user.login} does not have write access. Requiring manual approval for documentation deployment.`)
              return "manual-approval"
            }

  deploy:
    runs-on: ubuntu-latest
    needs: [authorization-check]
    if: always() && needs.authorization-check.result == 'success'
    environment: ${{ needs.authorization-check.outputs.approval-env }}

    permissions:
      contents: read
      pull-requests: write # For PR comments
      id-token: write # For OIDC authentication

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0 # Full history for git info in docs
          persist-credentials: false # Don't persist credentials for subsequent actions

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.x

      - name: Set up Node.js
        uses: actions/setup-node@v6

      - name: Clone typescript_sdk
        run: |
          git clone https://github.com/strands-agents/sdk-typescript.git/ ./sdk-typescript

      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-

      - name: Install dependencies
        run: |
          pip install .
          npm install ./sdk-typescript
          npm install

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.STRANDS_DOCS_DEPLOY_ROLE }} # Store role ARN in repository secrets
          role-session-name: GitHubActions-MkDocs-${{ github.run_id }}
          aws-region: us-east-1
          mask-aws-account-id: true

      - name: Build MkDocs site
        run: |
          mkdocs build --clean --strict

      - name: Set deployment path
        id: deployment-path
        run: |
          # PR preview: deploy to pr-{number} folder
          echo "path=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT

          echo "base_url=${{ secrets.CLOUDFRONT_DOMAIN_NAME }}/pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT

      - name: Deploy to S3
        run: |
          # Deploy to preview path for PRs
          aws s3 sync site/ s3://${{ env.S3_BUCKET }}/${{ steps.deployment-path.outputs.path }}/ \
            --cache-control "public, max-age=3600"

      - name: Invalidate CloudFront cache for PR preview
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/${{ steps.deployment-path.outputs.path }}/*"

      - name: Comment on PR with preview link
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deployment-path.outputs.base_url }}';
            const body = `## Documentation Preview

            Your documentation changes are ready for review!

            **Preview URL**: ${previewUrl}

            This preview will be available until the PR is closed.

            ---
            *Generated by GitHub Actions*`;

            // Find existing comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.data.find(comment => 
              comment.body.includes('Documentation Preview')
            );

            if (existingComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: body
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

      - name: Output deployment info
        run: |
          echo "Deployment complete!"
          echo "Deployed to: ${{ steps.deployment-path.outputs.base_url }}"
          echo "This is a preview deployment for PR #${{ github.event.pull_request.number }}"
